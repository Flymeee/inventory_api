<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory CRUD</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #333; }
    form, .search-sort { margin-bottom: 20px; }
    input, button { padding: 5px; margin: 5px; }
    button { cursor: pointer; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background-color: #f4f4f4; }
  </style>
</head>
<body>
  <h1>Inventory</h1>

  <!-- Search & Sort Controls -->
  <div class="search-sort">
    <input type="text" id="search" placeholder="Search inventory...">
    <button onclick="sortInventory('name')">Sort by Name</button>
    <button onclick="sortInventory('quantity')">Sort by Quantity</button>
    <button onclick="sortInventory('price')">Sort by Price</button>
  </div>

  <!-- Add Inventory Form -->
  <form id="add-form">
    <input type="text" id="name" placeholder="Name" required>
    <input type="number" id="quantity" placeholder="Quantity" required>
    <input type="number" step="0.01" id="price" placeholder="Price" required>
    <button type="submit">Add Item</button>
  </form>

  <!-- Inventory Table -->
  <table id="inventory-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Quantity</th>
        <th>Price ($)</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
